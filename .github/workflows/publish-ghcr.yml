name: Publish wa-desk image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/wa-desk/Dockerfile
          push: true
          tags: |
            ghcr.io/sulmanamazon25-ctrl/wa-desk:latest
            ghcr.io/sulmanamazon25-ctrl/wa-desk:${{ github.sha }}

      - name: Make package public for Coolify pull
        continue-on-error: true
        run: gh api --method PATCH /user/packages/container/wa-desk -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
